name: Deploy to AWS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: SSH to AWS and Deploy
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 32.236.14.51
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/docker-status
            ./deploy.sh

